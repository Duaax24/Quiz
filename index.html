<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <title>Klassisches Quiz</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <!-- Logo (besser hier statt im <head>) -->
  <img src="logo.png" class="logo">

  <h1 id="theme">Thema: .....</h1>

  <div class="progress-container">
    <div id="progress-bar"></div>
  </div>

  <p id="progress-text"></p>

  <div class="quiz-container">
    <h2 id="question">Frage kommt hier</h2>
    <div id="answers"></div>
    <button id="nextBtn">Weiter</button>
    <h3 id="score"></h3>
    <button id="restartBtn">Nochmal spielen</button>
  </div>

  <!-- ✅ WICHTIG: Canvas ganz am Ende + korrekt positioniert -->
  <canvas id="confetti-canvas"></canvas>

  <script src="script.js"></script>

</body>
</html>
